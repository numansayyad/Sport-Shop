{% extends "base.html" %}
{% block content %}
<style>
  /* ✅ Prevent width + padding from overflowing */
  *, *::before, *::after { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 0;
    background: url("{{ url_for('static', filename='images/alog-bg.webp') }}") no-repeat center center fixed;
    background-size: cover;
    font-family: "Segoe UI", sans-serif;
  }

  .admin-login {
    max-width: 420px;
    width: 600px;
    margin: 80px auto;
    padding: 40px;
    background: rgba(255, 255, 255, 0.15); /* glass */
    backdrop-filter: blur(12px);
    border-radius: 18px;
    box-shadow: 0 12px 28px rgba(0,0,0,0.25);
    text-align: center;
    overflow: hidden; /* safety clip */
  }

  .admin-login h2 {
    margin: 0 0 30px;
    font-size: 26px;
    font-weight: 800;
    color: #39b5e6;
    text-shadow: 0 1px 2px rgba(255,255,255,0.6);
  }

  .field {
    position: relative;
    margin: 14px 0;
  }

  .field i {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: #39cfe6;
    font-size: 16px;
    pointer-events: none;
  }

  .field input {
    display: block;
    width: 100%;
    padding: 12px 14px 12px 44px; /* space for icon */
    border: 1px solid rgba(0,0,0,0.15);
    border-radius: 10px;
    background: #ffffff;          /* ✅ solid so it's clearly inside */
    color: #222;
    font-size: 15px;
    outline: none;
  }

  .field input::placeholder { color: #666; }

  .btn {
    width: 100%;
    padding: 12px 16px;
    border: none;
    border-radius: 10px;
    background: #39c1e6;
    color: #fff;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    transition: transform .15s ease, filter .15s ease;
    margin-top: 6px;
  }
  .btn:hover { filter: brightness(0.95); transform: translateY(-1px); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  
  }
  @media (max-width: 576px) {   /* Mobile */
    .login-container {
      width: 90%;
      margin: 40px auto;
      padding: 20px;
    }
    .login-container h2 {
      font-size: 22px;
    }
    .input-box input {
      font-size: 14px;
      padding: 10px;
    }
    button {
      font-size: 15px;
      padding: 10px;
    }
    .extra-links {
      font-size: 13px;
    }
  }
</style>

<div class="admin-login" style="animation: fadeIn .6s ease;">
  <h2>🔑 Admin Login</h2>
  <form method="POST" novalidate>
    <div class="field">
      <i class="fa-solid fa-user-shield"></i>
      <input type="text" name="email" placeholder="Admin Email" required>
    </div>
    <div class="field">
      <i class="fa-solid fa-lock"></i>
      <input type="password" name="password" placeholder="Password" required>
    </div>
    <button class="btn" type="submit"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
  </form>

  <!-- Back to Login button -->
  <a href="{{ url_for('auth_bp.login') }}" 
     style="display: inline-block; margin-top: 16px; color: #39d2e6; font-weight: 700; text-decoration: none; transition: 0.3s;">
     ← Back to Login
  </a>
</div>

{% endblock %}
