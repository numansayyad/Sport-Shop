<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sports Shop Admin Panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>
<body>

  <!-- Top Navbar -->
  <div class="topbar">
    <div class="logo">
      <h4>Sports Shop Admin</h4>
    </div>
    <div class="user-info">
      <span><i class="fa-solid fa-user"></i> {{ session.get('admin_email') }}</span>
      <a href="{{ url_for('admin_bp.logout') }}"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
      <button class="btn btn-light btn-sm d-lg-none menu-toggle"><i class="fa-solid fa-bars"></i></button>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <a href="{{ url_for('admin_bp.dashboard') }}"><i class="fa-solid fa-gauge"></i> <span>Dashboard</span></a>
    <a href="{{ url_for('admin_bp.manage_users') }}"><i class="fa-solid fa-users"></i> <span>Users</span></a>
    <a href="{{ url_for('admin_bp.manage_products') }}"><i class="fa-solid fa-box"></i> <span>Products</span></a>
    <a href="{{ url_for('admin_bp.manage_orders') }}"><i class="fa-solid fa-cart-shopping"></i> <span>Orders</span></a>
  </div>

  <!-- Main Content -->
  <div class="content">
    {% block content %}
    {% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.querySelector('.menu-toggle');

    if(toggleBtn){
      toggleBtn.addEventListener('click', ()=>{
        sidebar.classList.toggle('show');
      });
    }
  </script>

</body>
</html>
